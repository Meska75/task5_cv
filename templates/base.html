{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="{% static 'images/favicon.png' %}" rel="icon">
  <title>{% block title %}محمد اسکندرلو — مهندس بک‌اند و هوش مصنوعی{% endblock %}</title>
  <meta name="description" content="{% block description %}مهندس بک‌اند پایتون/جنگو و هوش مصنوعی — سازنده‌ی پلتفرم‌های داده‌محور و هوشمند.{% endblock %}">

  <!-- Fonts: Vazirmatn (Persian) + JetBrains Mono (terminal/code accents) -->
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="{% static 'vendor/font-awesome/css/all.min.css' %}" rel="stylesheet">

  <!-- Tailwind (CDN for dev; compiled at deploy) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      '#0F172A',
            surface: '#1E293B',
            surface2:'#334155',
            accent:  '#22C55E',
            accent2: '#4ADE80',
            ink:     '#F8FAFC',
            muted:   '#94A3B8',
          },
          fontFamily: {
            sans: ['Vazirmatn', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { background: #0F172A; }
    /* subtle dotted grid for the terminal/dev vibe */
    .grid-bg {
      background-image: radial-gradient(rgba(148,163,184,.08) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .card-hover { transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease; }
    .card-hover:hover { transform: translateY(-4px); border-color: #22C55E; box-shadow: 0 12px 40px rgba(0,0,0,.45); }
    @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } .card-hover { transition: none; } }
    [x-cloak] { display: none !important; }
  </style>

  <!-- Interactivity -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  {% block head_extra %}{% endblock %}
</head>
<body class="font-sans text-ink bg-bg antialiased">
  {% block body %}{% endblock %}
</body>
</html>
