{% extends "registration/_auth_base.html" %}
{% block title %}بازیابی رمز عبور{% endblock %}
{% block body %}
  <h1>بازیابی رمز عبور</h1>
  <p>ایمیل حساب خود را وارد کنید تا لینک تعیین رمز جدید برایتان ارسال شود.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.email.errors }}
    <label for="{{ form.email.id_for_label }}">ایمیل</label>
    {{ form.email }}
    <button type="submit">ارسال لینک بازیابی</button>
  </form>
{% endblock %}
