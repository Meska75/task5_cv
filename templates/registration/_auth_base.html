<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}بازیابی رمز عبور{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8; --primary:#6366f1; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
           font-family:'Vazirmatn',system-ui,sans-serif; background:var(--bg); color:var(--text); padding:1rem; }
    .card { background:var(--card); width:100%; max-width:420px; border-radius:1rem; padding:2rem;
            box-shadow:0 10px 40px rgba(0,0,0,.4); }
    h1 { font-size:1.25rem; margin:0 0 .5rem; }
    p { color:var(--muted); line-height:1.9; font-size:.95rem; }
    label { display:block; margin:1rem 0 .35rem; font-size:.9rem; }
    input { width:100%; padding:.7rem .9rem; border-radius:.6rem; border:1px solid #334155;
            background:#0f172a; color:var(--text); font-family:inherit; font-size:1rem; }
    input:focus { outline:none; border-color:var(--primary); }
    button { width:100%; margin-top:1.5rem; padding:.8rem; border:none; border-radius:.6rem;
             background:var(--primary); color:#fff; font-family:inherit; font-size:1rem; cursor:pointer; }
    button:hover { background:#4f46e5; }
    .errorlist { color:#f87171; list-style:none; padding:0; font-size:.85rem; }
    a { color:var(--primary); }
  </style>
</head>
<body>
  <div class="card">
    {% block body %}{% endblock %}
  </div>
</body>
</html>
